name: aurora-db-ci

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SQLFluff
        run: pip install sqlfluff
      - name: Lint SQL
        run: sqlfluff lint ddl/**/*.sql --dialect postgres

  ci-tests:
    runs-on: ubuntu-latest
    needs: lint-and-format
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Wait for Postgres
        run: sleep 10
      - name: Apply migrations to ephemeral DB
        run: |
          curl -sL https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/9.0.0/flyway-commandline-9.0.0-linux-x64.tar.gz | tar xz
          ./flyway-*/flyway -url=jdbc:postgresql://localhost:5432/postgres -user=postgres -password=postgres migrate
      - name: Run integration tests
        run: psql postgresql://postgres:postgres@localhost:5432/postgres -f tests/integration.sql

  deploy-staging:
    runs-on: ubuntu-latest
    needs: ci-tests
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Run pre-deploy checks and deploy to staging
        env:
          FLYWAY_URL: ${{ secrets.STAGING_DB_URL }}
          FLYWAY_USER: ${{ secrets.STAGING_DB_USER }}
          FLYWAY_PASSWORD: ${{ secrets.STAGING_DB_PASS }}
        run: |
          ./flyway-*/flyway -url="$FLYWAY_URL" -user="$FLYWAY_USER" -password="$FLYWAY_PASSWORD" info
          ./flyway-*/flyway -url="$FLYWAY_URL" -user="$FLYWAY_USER" -password="$FLYWAY_PASSWORD" migrate

  approve-and-deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Await manual approval
        uses: peter-evans/repository-dispatch@v2
      - name: Snapshot production cluster
        run: aws rds create-db-cluster-snapshot --db-cluster-identifier ${{ secrets.PROD_CLUSTER_ID }} --db-cluster-snapshot-identifier "pre-migrate-${{ github.run_id }}"
      - name: Run Flyway migrate to production
        env:
          FLYWAY_URL: ${{ secrets.PROD_DB_URL }}
          FLYWAY_USER: ${{ secrets.PROD_DB_USER }}
          FLYWAY_PASSWORD: ${{ secrets.PROD_DB_PASS }}
        run: ./flyway-*/flyway -url="$FLYWAY_URL" -user="$FLYWAY_USER" -password="$FLYWAY_PASSWORD" migrate
